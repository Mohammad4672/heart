<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ruba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e6bff, #0b1b52, #050816);
            -webkit-user-select: none;
            user-select: none;
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Center */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* Stages */
        .stage {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .stage.active {
            display: block;
        }

        /* Intro */
        #openBtn {
            color: white;
            font-size: 32px;
            cursor: pointer;
            text-shadow: 0 0 15px #66b3ff, 0 0 30px #66b3ff;
            transition: all 0.3s ease;
            animation: glowText 2s ease-in-out infinite;
        }

        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 15px #66b3ff, 0 0 30px #66b3ff; }
            50% { text-shadow: 0 0 25px #66b3ff, 0 0 50px #66b3ff, 0 0 75px #66b3ff; }
        }

        #openBtn:hover {
            transform: scale(1.1);
        }

        /* Heart */
        .heart-container {
            width: 320px;
            height: 320px;
            position: relative;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .heart-container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .heart-half {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 190px;
            transition: 1s ease;
            filter: drop-shadow(0 0 25px #ff4d88) drop-shadow(0 0 50px #ff4d88);
            animation: heartPulse 1.2s ease-in-out infinite;
        }

        .heart-half.left {
            transform: translate(-50%, -50%);
        }

        .heart-half.right {
            transform: translate(-50%, -50%) scaleX(-1);
            animation: heartPulseRight 1.2s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: drop-shadow(0 0 25px #ff4d88) drop-shadow(0 0 50px #ff4d88);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.08); 
                filter: drop-shadow(0 0 35px #ff4d88) drop-shadow(0 0 70px #ff4d88);
            }
        }

        @keyframes heartPulseRight {
            0%, 100% { 
                transform: translate(-50%, -50%) scaleX(-1) scale(1); 
                filter: drop-shadow(0 0 25px #ff4d88) drop-shadow(0 0 50px #ff4d88);
            }
            50% { 
                transform: translate(-50%, -50%) scaleX(-1) scale(1.08); 
                filter: drop-shadow(0 0 35px #ff4d88) drop-shadow(0 0 70px #ff4d88);
            }
        }

        .heart-container.open .heart-half.left {
            animation: none;
            transform: translate(calc(-50% - 130px), -50%);
            filter: drop-shadow(0 0 25px #ff4d88) drop-shadow(0 0 50px #ff4d88);
        }

        .heart-container.open .heart-half.right {
            animation: none;
            transform: translate(calc(-50% + 130px), -50%) scaleX(-1);
            filter: drop-shadow(0 0 25px #ff4d88) drop-shadow(0 0 50px #ff4d88);
        }

        /* Name inside heart */
        #insideText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: #ff0000;
            opacity: 0;
            text-shadow: 0 0 20px #ff4d88, 0 0 40px #ff4d88, 0 0 60px #ff4d88, 0 0 80px #ff0000;
            transition: top 1s ease, opacity 0.5s ease, color 1s ease, text-shadow 1s ease;
            cursor: pointer;
            z-index: 10;
            pointer-events: none;
        }

        #insideText.show {
            opacity: 1;
            animation: namePulse 1s infinite;
            pointer-events: auto;
        }

        #insideText.moveUp {
            top: -20%;
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500, 0 0 60px #FFD700, 0 0 80px #FFA500;
            animation: namePulseGold 1s infinite;
        }

        @keyframes namePulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                text-shadow: 0 0 20px #ff4d88, 0 0 40px #ff4d88, 0 0 60px #ff4d88, 0 0 80px #ff0000;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.15); 
                text-shadow: 0 0 30px #ff4d88, 0 0 60px #ff4d88, 0 0 90px #ff4d88, 0 0 120px #ff0000;
            }
        }

        @keyframes namePulseGold {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                text-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500, 0 0 60px #FFD700, 0 0 80px #FFA500;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.15); 
                text-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500, 0 0 90px #FFD700, 0 0 120px #FFA500;
            }
        }

        /* Final love message */
        #finalMessage {
            position: absolute;
            top: -60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: bold;
            color: #00FFFF;
            opacity: 0;
            text-shadow: 0 0 20px #00FFFF, 0 0 40px #00CED1, 0 0 60px #00FFFF, 0 0 80px #00CED1;
            transition: opacity 1s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        #finalMessage.show {
            opacity: 1;
            animation: finalPulse 1s infinite;
        }

        @keyframes finalPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                text-shadow: 0 0 20px #00FFFF, 0 0 40px #00CED1, 0 0 60px #00FFFF, 0 0 80px #00CED1;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1); 
                text-shadow: 0 0 30px #00FFFF, 0 0 60px #00CED1, 0 0 90px #00FFFF, 0 0 120px #00CED1;
            }
        }

        /* Final ending message */
        #endingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #ff6b9d;
            opacity: 0;
            text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4d88, 0 0 60px #ff6b9d;
            text-align: center;
            line-height: 1.8;
            direction: rtl;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        #endingMessage.show {
            opacity: 1;
            animation: endingPulse 2s ease-in-out infinite;
        }

        @keyframes endingPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4d88, 0 0 60px #ff6b9d;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.05); 
                text-shadow: 0 0 30px #ff6b9d, 0 0 60px #ff4d88, 0 0 90px #ff6b9d, 0 0 120px #ff4d88;
            }
        }

        /* Floating hearts */
        .floating-heart {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            pointer-events: none;
        }

        .floating-heart.spin1 {
            animation: riseAndSpin1 4s linear forwards;
        }

        .floating-heart.spin2 {
            animation: riseAndSpin2 4.5s linear forwards;
        }

        .floating-heart.spin3 {
            animation: riseAndSpin3 5s linear forwards;
        }

        .floating-heart.spin4 {
            animation: riseAndSpin4 4.2s linear forwards;
        }

        @keyframes riseAndSpin1 {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; }
        }

        @keyframes riseAndSpin2 {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(-720deg); opacity: 0; }
        }

        @keyframes riseAndSpin3 {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            25% { transform: translateY(-30vh) translateX(30px) rotate(180deg); }
            50% { transform: translateY(-60vh) translateX(-30px) rotate(360deg); }
            75% { transform: translateY(-90vh) translateX(30px) rotate(540deg); }
            100% { transform: translateY(-120vh) translateX(0) rotate(720deg); opacity: 0; }
        }

        @keyframes riseAndSpin4 {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            20% { opacity: 1; }
            25% { transform: translateY(-30vh) rotate(90deg) scale(1.3); }
            50% { transform: translateY(-60vh) rotate(180deg) scale(0.7); }
            75% { transform: translateY(-90vh) rotate(270deg) scale(1.2); }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Intro -->
    <div id="intro" class="stage active">
        <div class="center">
            <div id="openBtn">Open Message</div>
        </div>
    </div>

    <!-- Heart Stage -->
    <div id="heartStage" class="stage">
        <div class="center">
            <div class="heart-container" id="heartContainer">
                <div class="heart-half left">🫀</div>
                <div class="heart-half right">🫀</div>
                <div id="insideText">Ruba</div>
                <div id="finalMessage">Bhbk ya Ruba</div>
            </div>
            <div id="endingMessage">هيدي كانت قصة قلبي<br>وهيدا القلب ما حدا بياخدو غيرك يا رُبى</div>
        </div>
    </div>

    <!-- Audio -->
    <audio id="music" src="music.m4a" loop></audio>
    <audio id="v1" src="voice1.m4a"></audio>
    <audio id="v2" src="voice2.m4a"></audio>
    <audio id="v3" src="voice3.m4a"></audio>
    <audio id="v4" src="voice4.m4a"></audio>
    <audio id="soft" src="soft.m4a"></audio>

    <script>
        // Create stars
        for (let i = 0; i < 120; i++) {
            const s = document.createElement("div");
            s.className = "star";
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            s.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(s);
        }

        let stage = 0;
        let heartsInterval = null;

        const intro = document.getElementById("intro");
        const heartStage = document.getElementById("heartStage");
        const openBtn = document.getElementById("openBtn");
        const heartContainer = document.getElementById("heartContainer");
        const insideText = document.getElementById("insideText");
        const finalMessage = document.getElementById("finalMessage");
        const endingMessage = document.getElementById("endingMessage");

        const music = document.getElementById("music");
        const v1 = document.getElementById("v1");
        const v2 = document.getElementById("v2");
        const v3 = document.getElementById("v3");
        const v4 = document.getElementById("v4");
        const soft = document.getElementById("soft");

        // Set music volume lower
        music.volume = 0.3;
        soft.volume = 0.4;

        // Different heart emojis for variety
        const heartTypes = ['💖', '💗', '💓', '💕', '💞', '💝', '❤️', '💘', '🩷', '🤍', '💜', '🩵'];
        const spinTypes = ['spin1', 'spin2', 'spin3', 'spin4'];

        function showStage(s) {
            intro.classList.remove("active");
            heartStage.classList.remove("active");
            if (s === "intro") intro.classList.add("active");
            if (s === "heart") heartStage.classList.add("active");
        }

        function spawnHeart() {
            const h = document.createElement("div");
            h.className = "floating-heart";
            h.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            h.classList.add(spinTypes[Math.floor(Math.random() * spinTypes.length)]);
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 18) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5500);
        }

        function startHearts() {
            heartsInterval = setInterval(spawnHeart, 250);
        }

        function stopHearts() {
            if (heartsInterval) {
                clearInterval(heartsInterval);
                heartsInterval = null;
            }
            // Remove all floating hearts
            document.querySelectorAll('.floating-heart').forEach(h => h.remove());
        }

        // When soft music ends, show final ending message
        soft.addEventListener('ended', () => {
            // Hide everything
            heartContainer.classList.add('hidden');
            finalMessage.classList.remove('show');
            stopHearts();
            
            // Show ending message
            setTimeout(() => {
                endingMessage.classList.add('show');
            }, 500);
            
            stage = 6;
        });

        // Stage 0: Click "Open Message"
        openBtn.onclick = () => {
            showStage("heart");
            music.play().catch(() => {});
            v1.play().catch(() => {});
            stage = 1;
        };

        // Heart clicks
        heartContainer.onclick = () => {
            if (stage === 1) {
                heartContainer.classList.add("open");
                insideText.classList.add("show");
                v2.play().catch(() => {});
                stage = 2;
            }
            else if (stage === 3) {
                heartContainer.classList.add("open");
                insideText.classList.remove("moveUp");
                insideText.classList.add("show");
                v4.play().catch(() => {});
                stage = 4;
            }
        };

        // Name clicks
        insideText.onclick = (e) => {
            e.stopPropagation();

            if (stage === 2) {
                insideText.classList.add("moveUp");
                heartContainer.classList.remove("open");
                v3.play().catch(() => {});
                stage = 3;

                setTimeout(() => {
                    if (stage === 3) {
                        insideText.classList.remove("show");
                        insideText.classList.remove("moveUp");
                    }
                }, 5000);
            }
            else if (stage === 4) {
                heartContainer.classList.remove("open");
                insideText.classList.remove("show");
                music.pause();
                soft.play().catch(() => {});
                
                setTimeout(() => {
                    finalMessage.classList.add("show");
                }, 500);
                
                startHearts();
                stage = 5;
            }
        };
    </script>

</body>
</html>
